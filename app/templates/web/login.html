<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - IOIQ 智能瞭望与智能问数系统</title>
    <link rel="stylesheet" href="/static/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/fontawesome-free-6.4.0-web/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        .login-container {
            display: flex;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .login-left {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            color: #fff;
            padding: 60px;
            position: relative;
        }
        .login-left::before {
            content: '';
            position: absolute;
            top: -20%; right: -10%;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99,132,255,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .left-brand {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 24px; z-index: 1;
        }
        .left-brand .icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .left-brand .name {
            font-size: 24px; font-weight: 700;
            letter-spacing: 2px;
        }
        .left-slogan {
            font-size: 16px; color: #94a3b8;
            margin-bottom: 50px; z-index: 1;
            text-align: center;
        }
        .left-features {
            list-style: none; z-index: 1;
            display: flex; flex-direction: column; gap: 12px;
        }
        .left-features li {
            font-size: 14px; color: #cbd5e1;
            display: flex; align-items: center; gap: 10px;
        }
        .left-features li i {
            color: #6366f1; font-size: 16px; width: 20px; text-align: center;
        }
        .login-right {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            background: #fff;
            padding: 60px;
            border-radius: 32px 0 0 32px;
            position: relative;
        }
        .login-form-wrapper {
            width: 100%; max-width: 400px;
        }
        .login-form-wrapper h2 {
            font-size: 26px; font-weight: 700; color: #1e293b; margin-bottom: 6px;
        }
        .login-form-wrapper .sub {
            font-size: 14px; color: #94a3b8; margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            font-size: 13px; color: #475569; font-weight: 600; margin-bottom: 6px; display: block;
        }
        .form-control {
            border-radius: 10px; border: 1.5px solid #e2e8f0;
            padding: 13px 16px; font-size: 15px;
            transition: all 0.25s ease;
        }
        .form-control:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74,108,247,0.12);
        }
        .btn-login {
            width: 100%; padding: 13px;
            border-radius: 10px; border: none;
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; letter-spacing: 2px;
            transition: all 0.25s ease;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(74,108,247,0.35);
        }
        .error-msg {
            color: #e53e3e; font-size: 13px; margin-top: 8px;
        }
        .register-link {
            text-align: center; margin-top: 20px;
            font-size: 14px; color: #94a3b8;
        }
        .register-link a {
            color: #4a6cf7; text-decoration: none; font-weight: 600;
        }
        @media (max-width: 768px) {
            .login-left { display: none; }
            .login-right { border-radius: 0; padding: 40px 24px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-left">
        <div class="left-brand">
            <div class="icon"><i class="fas fa-eye"></i></div>
            <span class="name">IOIQ System</span>
        </div>
        <p class="left-slogan">智能瞭望 · 智能问数 · 一站式数据智能平台</p>
        <ul class="left-features">
            <li><i class="fas fa-robot"></i> AI 驱动的智能对话与问数</li>
            <li><i class="fas fa-chart-line"></i> 实时数据可视化分析</li>
            <li><i class="fas fa-satellite-dish"></i> 智能瞭望与舆情监测</li>
            <li><i class="fas fa-shield-alt"></i> 安全可靠的权限管理</li>
        </ul>
    </div>
    <div class="login-right">
        <div class="login-form-wrapper">
            <h2>欢迎回来</h2>
            <p class="sub">登录您的账户，开始智能问数之旅</p>
            <form method="post" action="/login" id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                {% if error %}
                <div class="error-msg">{{ error }}</div>
                {% end %}
                <button type="submit" class="btn-login" style="margin-top: 10px;">
                    <i class="fas fa-sign-in-alt me-2"></i>登录
                </button>
            </form>
            <div class="register-link">
                还没有账户？<a href="/register">立即注册</a>
            </div>
            <div style="text-align:center; margin-top:8px; font-size:13px; color:#94a3b8;">
                <a href="/admin/login" style="color:#4a6cf7; text-decoration:none;">管理后台入口</a>
            </div>
        </div>
</div>
<script>
(function(){
    var form = document.getElementById('loginForm');
    var btn = form.querySelector('.btn-login');
    form.addEventListener('submit', function() {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>登录中...';
        btn.disabled = true;
    });
})();
</script>
</body>
</html>
