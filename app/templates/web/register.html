<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - IOIQ 智能瞭望与智能问数系统</title>
    <link rel="stylesheet" href="/static/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/fontawesome-free-6.4.0-web/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        .register-container {
            display: flex;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .register-left {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            color: #fff;
            padding: 60px;
            position: relative;
        }
        .register-left::before {
            content: '';
            position: absolute;
            top: -20%; right: -10%;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99,132,255,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .left-brand {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 24px; z-index: 1;
        }
        .left-brand .icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .left-brand .name {
            font-size: 24px; font-weight: 700;
            letter-spacing: 2px;
        }
        .left-slogan {
            font-size: 16px; color: #94a3b8;
            margin-bottom: 50px; z-index: 1;
            text-align: center;
        }
        .left-features {
            list-style: none; z-index: 1;
            display: flex; flex-direction: column; gap: 12px;
        }
        .left-features li {
            font-size: 14px; color: #cbd5e1;
            display: flex; align-items: center; gap: 10px;
        }
        .left-features li i {
            color: #6366f1; font-size: 16px; width: 20px; text-align: center;
        }
        .register-right {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            background: #fff;
            padding: 60px;
            border-radius: 0 32px 32px 0;
            position: relative;
        }
        .register-form-wrapper {
            width: 100%; max-width: 420px;
        }
        .register-form-wrapper h2 {
            font-size: 26px; font-weight: 700; color: #1e293b; margin-bottom: 6px;
        }
        .register-form-wrapper .sub {
            font-size: 14px; color: #94a3b8; margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            font-size: 13px; color: #475569; font-weight: 600; margin-bottom: 5px; display: block;
        }
        .form-control {
            border-radius: 10px; border: 1.5px solid #e2e8f0;
            padding: 12px 16px; font-size: 15px;
            transition: all 0.25s ease;
        }
        .form-control:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74,108,247,0.12);
        }
        .btn-register {
            width: 100%; padding: 13px;
            border-radius: 10px; border: none;
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; letter-spacing: 2px;
            transition: all 0.25s ease;
        }
        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(74,108,247,0.35);
        }
        .error-msg {
            color: #e53e3e; font-size: 13px; margin-bottom: 10px;
            background: #fef2f2; padding: 10px 14px; border-radius: 8px;
        }
        .login-link {
            text-align: center; margin-top: 18px;
            font-size: 14px; color: #94a3b8;
        }
        .login-link a {
            color: #4a6cf7; text-decoration: none; font-weight: 600;
        }
        @media (max-width: 768px) {
            .register-left { display: none; }
            .register-right { border-radius: 0; padding: 40px 24px; }
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-right" style="order:-1; border-radius: 32px 0 0 32px;">
        <div class="register-form-wrapper">
            <h2>创建账户</h2>
            <p class="sub">注册成为 IOIQ 用户，体验智能问数</p>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% end %}
            <form method="post">
                <div class="form-group">
                    <label>用户名 <span style="color:#94a3b8;font-weight:400;">(至少3个字符)</span></label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" value="{{ form.get('username', '') }}" required minlength="3">
                </div>
                <div class="form-group">
                    <label>邮箱 <span style="color:#94a3b8;font-weight:400;">(选填)</span></label>
                    <input type="email" name="email" class="form-control" placeholder="请输入邮箱地址" value="{{ form.get('email', '') }}">
                </div>
                <div class="form-group">
                    <label>密码 <span style="color:#94a3b8;font-weight:400;">(至少4个字符)</span></label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required minlength="4">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" name="password_confirm" class="form-control" placeholder="请再次输入密码" required minlength="4">
                </div>
                <button type="submit" class="btn-register" style="margin-top: 6px;">
                    <i class="fas fa-user-plus me-2"></i>注 册
                </button>
            </form>
            <div class="login-link">
                已有账户？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>
    <div class="register-left">
        <div class="left-brand">
            <div class="icon"><i class="fas fa-eye"></i></div>
            <span class="name">IOIQ System</span>
        </div>
        <p class="left-slogan">智能瞭望 · 智能问数 · 一站式数据智能平台</p>
        <ul class="left-features">
            <li><i class="fas fa-robot"></i> AI 驱动的智能对话与问数</li>
            <li><i class="fas fa-chart-line"></i> 实时数据可视化分析</li>
            <li><i class="fas fa-satellite-dish"></i> 智能瞭望与舆情监测</li>
            <li><i class="fas fa-shield-alt"></i> 安全可靠的权限管理</li>
        </ul>
    </div>
</div>
</body>
</html>
