<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - IOIQ 智能瞭望与智能问数系统</title>
    <link rel="stylesheet" href="/static/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/fontawesome-free-6.4.0-web/css/all.min.css">
    <style>
        :root {
            --bg-primary: #050816;
            --bg-card: rgba(10,18,40,0.85);
            --bg-input: rgba(5,12,30,0.5);
            --text-primary: #e0e8ff;
            --text-secondary: #7b89b8;
            --text-muted: #4a5580;
            --accent-cyan: #00e5ff;
            --accent-blue: #448aff;
            --accent-red: #ff5252;
            --border-input: rgba(0,229,255,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        .login-container {
            display: flex;
            width: 100%;
            height: 100vh;
            background: linear-gradient(170deg, #0a0e1a 0%, #0f1724 40%, #0b1120 100%);
            position: relative;
            overflow: hidden;
        }
        /* 星空背景 */
        .login-container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(2px 2px at 20% 30%, rgba(0,229,255,0.3), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(179,136,255,0.2), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(0,229,255,0.4), transparent),
                radial-gradient(2px 2px at 80% 20%, rgba(255,82,82,0.2), transparent),
                radial-gradient(1px 1px at 90% 80%, rgba(0,229,255,0.3), transparent),
                radial-gradient(2px 2px at 10% 90%, rgba(179,136,255,0.15), transparent),
                radial-gradient(1px 1px at 70% 10%, rgba(0,229,255,0.25), transparent);
            pointer-events: none;
        }
        /* 网格叠加 */
        .login-container::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        /* 左侧 - 登录表单区 */
        .login-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
            z-index: 1;
        }
        .login-form-wrapper {
            width: 100%;
            max-width: 420px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .brand-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #050816;
            font-size: 22px;
        }
        .brand-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 36px;
        }
        .form-floating {
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            font-size: 13px; color: var(--text-secondary); font-weight: 600; margin-bottom: 6px; display: block;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid var(--border-input);
            padding: 14px 16px;
            font-size: 15px;
            transition: all 0.25s ease;
            background: var(--bg-input);
            color: var(--text-primary);
            width: 100%;
        }
        .form-control:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
        }
        .floating-label {
            color: var(--text-muted);
            font-size: 13px;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #050816;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 2px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,229,255,0.35);
        }
        .error-msg {
            color: var(--accent-red);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        /* 右侧 - 装饰展示区 */
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a1628 0%, #0d2040 50%, #081830 100%);
            position: relative;
            overflow: hidden;
        }
        .login-right::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: rgba(0,229,255,0.04);
        }
        .login-right::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(179,136,255,0.03);
        }
        .right-content {
            text-align: center;
            color: #e0e8ff;
            z-index: 1;
            padding: 40px;
        }
        .right-content h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--accent-cyan);
        }
        .right-content p {
            font-size: 16px;
            opacity: 0.7;
            line-height: 1.8;
            max-width: 380px;
            margin: 0 auto 30px;
        }
        .feature-list {
            list-style: none;
            text-align: left;
            max-width: 360px;
            margin: 0 auto;
        }
        .feature-list li {
            padding: 8px 0;
            font-size: 14px;
            opacity: 0.8;
            color: #c0d0f0;
        }
        .feature-list li i {
            margin-right: 10px;
            color: var(--accent-cyan);
        }

        /* 响应式适配 */
        @media (max-width: 960px) {
            .login-right { display: none; }
            .login-left { padding: 40px 24px; }
            .login-form-wrapper { max-width: 400px; }
        }
        @media (max-width: 480px) {
            .login-left { padding: 24px 16px; }
            .welcome-title { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <!-- 左侧：登录表单 -->
    <div class="login-left">
        <div class="login-form-wrapper">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-eye"></i></div>
                <div class="brand-name">IOIQ System</div>
            </div>

            <div class="welcome-title">欢迎回来</div>
            <div class="welcome-subtitle">请输入您的账号信息以访问管理后台</div>

            <form id="loginForm" action="/admin/login" method="post">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user me-2"></i>用户名</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock me-2"></i>密码</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>

                {% if error %}
                <div class="error-msg" style="display:block;">{{ error }}</div>
                {% end %}

                <button type="submit" class="btn-login mt-4">
                    <i class="fas fa-sign-in-alt me-2"></i>登录
                </button>
            </form>
            <div style="text-align:center; margin-top:16px; font-size:13px; color:#94a3b8;">
                <a href="/login" style="color:#4a6cf7; text-decoration:none;">返回用户端</a>
            </div>
        </div>
    </div>

    <!-- 右侧：装饰展示 -->
    <div class="login-right">
        <div class="right-content">
            <h2>开启智能拓客新体验</h2>
            <p>基于大模型驱动的智能瞭望与问数综合系统，赋能企业数字化转型</p>
            <ul class="feature-list">
                <li><i class="fas fa-check-circle"></i>AI 驱动风险监测与预警</li>
                <li><i class="fas fa-check-circle"></i>自助式数据查询与分析</li>
                <li><i class="fas fa-check-circle"></i>智能对话与舆情分析</li>
                <li><i class="fas fa-check-circle"></i>数字员工多技能拓展</li>
            </ul>
        </div>
    </div>
</div>

<script src="/static/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
    var form = document.getElementById('loginForm');
    var btn = form.querySelector('.btn-login');
    var origHTML = btn.innerHTML;
    form.addEventListener('submit', function() {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>登录中...';
        btn.disabled = true;
    });
    // 如果有错误返回，按钮会被重新渲染，不需要恢复
})();
</script>
</body>
</html>
