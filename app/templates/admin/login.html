<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - IOIQ 智能瞭望与智能问数系统</title>
    <link rel="stylesheet" href="/static/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/fontawesome-free-6.4.0-web/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        .login-container {
            display: flex;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #e8ecf5 0%, #f4f6fb 50%, #eef2fa 100%);
        }
        /* 左侧 - 登录表单区 */
        .login-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
        }
        .login-left::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(99, 132, 255, 0.06);
            pointer-events: none;
        }
        .login-form-wrapper {
            width: 100%;
            max-width: 420px;
            z-index: 1;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .brand-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
        }
        .brand-name {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 1px;
        }
        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .welcome-subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 36px;
        }
        .form-floating {
            margin-bottom: 16px;
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            padding: 14px 16px;
            font-size: 15px;
            transition: all 0.25s ease;
            background: #fff;
        }
        .form-control:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.12);
        }
        .floating-label {
            color: #94a3b8;
            font-size: 13px;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 2px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.35);
        }
        .error-msg {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        /* 右侧 - 装饰展示区 */
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a6cf7 0%, #6366f1 50%, #818cf8 100%);
            position: relative;
            overflow: hidden;
        }
        .login-right::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }
        .login-right::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }
        .right-content {
            text-align: center;
            color: #fff;
            z-index: 1;
            padding: 40px;
        }
        .right-content h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .right-content p {
            font-size: 16px;
            opacity: 0.85;
            line-height: 1.8;
            max-width: 380px;
            margin: 0 auto 30px;
        }
        .feature-list {
            list-style: none;
            text-align: left;
            max-width: 360px;
            margin: 0 auto;
        }
        .feature-list li {
            padding: 8px 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .feature-list li i {
            margin-right: 10px;
            color: #a5b4fc;
        }

        /* 响应式适配 */
        @media (max-width: 960px) {
            .login-right { display: none; }
            .login-left { padding: 40px 24px; }
            .login-form-wrapper { max-width: 400px; }
        }
        @media (max-width: 480px) {
            .login-left { padding: 24px 16px; }
            .welcome-title { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <!-- 左侧：登录表单 -->
    <div class="login-left">
        <div class="login-form-wrapper">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-eye"></i></div>
                <div class="brand-name">IOIQ System</div>
            </div>

            <div class="welcome-title">欢迎回来</div>
            <div class="welcome-subtitle">请输入您的账号信息以访问管理后台</div>

            <form id="loginForm" action="/admin/login" method="post">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username" placeholder="用户名" required autocomplete="username">
                    <label for="username"><i class="fas fa-user me-2"></i>用户名</label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="密码" required autocomplete="current-password">
                    <label for="password"><i class="fas fa-lock me-2"></i>密码</label>
                </div>

                {% if error %}
                <div class="error-msg" style="display:block;">{{ error }}</div>
                {% end %}

                <button type="submit" class="btn-login mt-4">登 录</button>
            </form>
        </div>
    </div>

    <!-- 右侧：装饰展示 -->
    <div class="login-right">
        <div class="right-content">
            <h2>开启智能拓客新体验</h2>
            <p>基于大模型驱动的智能瞭望与问数综合系统，赋能企业数字化转型</p>
            <ul class="feature-list">
                <li><i class="fas fa-check-circle"></i>AI 驱动风险监测与预警</li>
                <li><i class="fas fa-check-circle"></i>自助式数据查询与分析</li>
                <li><i class="fas fa-check-circle"></i>智能对话与舆情分析</li>
                <li><i class="fas fa-check-circle"></i>数字员工多技能拓展</li>
            </ul>
        </div>
    </div>
</div>

<script src="/static/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    var btn = this.querySelector('.btn-login');
    btn.textContent = '登 录 中...';
    btn.disabled = true;
});
</script>
</body>
</html>
