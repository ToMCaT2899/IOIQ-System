{% extends "base.html" %}

{% block title %}控制台{% end %}

{% block content %}
<div class="page-header">
    <h2>控制台</h2>
    <p>欢迎使用 IOIQ 智能瞭望与智能问数系统管理后台 <span id="refreshTag" style="font-size:11px;color:var(--text-muted);margin-left:8px;"></span></p>
</div>

<div class="stat-grid">
    <div class="stat-card">
        <div class="stat-icon" style="background:rgba(0,229,255,0.1);color:var(--accent-cyan);"><i class="fas fa-eye"></i></div>
        <div>
            <div class="stat-value" style="color:var(--accent-cyan);" id="statWatch">--</div>
            <div class="stat-label">智能瞭望</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon" style="background:rgba(0,230,118,0.1);color:var(--accent-green);"><i class="fas fa-database"></i></div>
        <div>
            <div class="stat-value" style="color:var(--accent-green);" id="statData">--</div>
            <div class="stat-label">自助问数</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon" style="background:rgba(255,145,0,0.1);color:var(--accent-orange);"><i class="fas fa-comments"></i></div>
        <div>
            <div class="stat-value" style="color:var(--accent-orange);" id="statChat">--</div>
            <div class="stat-label">智能对话</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon" style="background:rgba(255,64,129,0.1);color:var(--accent-pink);"><i class="fas fa-chart-line"></i></div>
        <div>
            <div class="stat-value" style="color:var(--accent-pink);" id="statSentiment">--</div>
            <div class="stat-label">舆情分析</div>
        </div>
    </div>
</div>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-card">
        <h3 style="font-size:15px; font-weight:600; color:var(--text-primary); margin-bottom:16px;display:flex;align-items:center;gap:10px;">
            <i class="fas fa-bell" style="color:var(--accent-cyan);"></i>系统公告
        </h3>
        <div style="color:var(--text-secondary); font-size:14px; line-height:1.8;">
            <p>欢迎使用 IOIQ 智能瞭望与智能问数系统。</p>
            <p>当前版本：v0.1（开发中）</p>
            <p>更多功能模块正在持续开发中，敬请期待。</p>
        </div>
    </div>

    <div class="form-card">
        <h3 style="font-size:15px; font-weight:600; color:var(--text-primary); margin-bottom:16px;display:flex;align-items:center;gap:10px;">
            <i class="fas fa-info-circle" style="color:var(--accent-cyan);"></i>系统信息
        </h3>
        <ul class="info-list">
            <li><span class="info-label">系统名称</span><span class="info-value">IOIQ 智能瞭望与智能问数系统</span></li>
            <li><span class="info-label">数据库引擎</span><span class="info-value" id="dbEngine">--</span></li>
            <li><span class="info-label">当前用户</span><span class="info-value">{{ username }}</span></li>
            <li><span class="info-label">服务端口</span><span class="info-value">10086</span></li>
        </ul>
    </div>
</div>

<script>
(function(){
    function loadStats(){
        fetch('/admin/stats',{credentials:'same-origin'})
            .then(function(r){ return r.json(); })
            .then(function(resp){
                if (!resp.ok) return;
                var d = resp.data;
                document.getElementById('statWatch').textContent    = d.watch_sources;
                document.getElementById('statData').textContent     = d.data_entries;
                document.getElementById('statChat').textContent     = d.chat_sessions;
                document.getElementById('statSentiment').textContent= d.sentiment_analysis;
                document.getElementById('dbEngine').textContent     = d.engine || '--';
                var now = new Date();
                var ts = now.getHours().toString().padStart(2,'0') + ':' +
                         now.getMinutes().toString().padStart(2,'0') + ':' +
                         now.getSeconds().toString().padStart(2,'0');
                document.getElementById('refreshTag').textContent = '(实时更新 ' + ts + ')';
            })
            .catch(function(){});
    }
    loadStats();
    setInterval(loadStats, 15000);
})();
</script>
{% end %}
